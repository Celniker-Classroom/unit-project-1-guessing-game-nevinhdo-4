<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Game</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        color: #111;
        padding: 20px;
        transition: background-color 0.3s, color 0.3s;
      }

      button, input {
        margin: 4px;
        padding: 6px 10px;
      }

      .bubble-box {
        width: 320px;
        background-color: white;
        border: 2px solid #d9d9d9;
        border-radius: 16px;
        padding: 14px 18px;
        margin: 12px 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .dark-mode {
        background-color: #121212;
        color: #f5f5f5;
      }

      .dark-mode button,
      .dark-mode input {
        background-color: #1f1f1f;
        color: #f5f5f5;
        border: 1px solid #555;
      }

      .dark-mode .bubble-box {
        background-color: #1b1b1b;
        border-color: #444;
      }

      #gameTitle {
        transition: all 0.3s ease;
      }

      .rainbow-win {
        background: linear-gradient(90deg, #d98c8c, #d9b38c, #d9d18c, #9fd9a8, #8cbfd9, #a78cd9, #d18cd9, #d98c8c);
        background-size: 300% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: rainbowShift 6s ease-in-out infinite;
      }

      @keyframes rainbowShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
    </style>
    <script src="script.js" defer></script>
  </head>
  <body>
    <button id="darkModeBtn">Toggle Dark Mode</button>
    <h1 id="gameTitle">Guessing Game</h1>

    <div class="bubble-box">
      <p id="date"></p>
    </div>

    <div class="bubble-box">
      <h3>Level</h3>
      <input type="radio" name="level" id="e" value="3" checked><label for="e">Easy</label>
      <input type="radio" name="level" id="m" value="10"><label for="m">Medium</label>
      <input type="radio" name="level" id="h" value="100"><label for="h">Hard</label>

      <button id="playBtn">Play</button>
    </div>

    <div class="bubble-box">
      <h3 id="msg">Select a Level</h3>
      <input type="text" id="guess" placeholder="Enter your guess">
      <button id="guessBtn" disabled>Guess</button>
      <button id="submit" disabled>Submit Guess</button>
      <button id="giveUpBtn" disabled>Give Up</button>
    </div>

    <div class="bubble-box">
      <h3>Stats</h3>
      <p id="wins">Total wins: 0</p>
      <p id="avgScore">Average Score: </p>
      <p id="fastest">Fastest Game: </p>
      <p id="avgTime">Average Time: </p>
    </div>

    <div class="bubble-box">
      <h3>Leaderboard</h3>
      <ol>
        <li name="leaderboard">100</li>
        <li name="leaderboard">100</li>
        <li name="leaderboard">100</li>
      </ol>
    </div>
  </body>
</html>
